name: Bump Version on Release Label

on:
  pull_request:
    types: [labeled]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    if: >-
      github.event.pull_request.state == 'open' && (
        github.event.label.name == 'release:major' ||
        github.event.label.name == 'release:minor' ||
        github.event.label.name == 'release:patch'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install bump-my-version black isort autoflake

      - name: Set up Git user
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Format with autoflake, isort, and black
        run: |
          PYTHON_FILES=$(find . -name "*.py" -type f -not -path "*/\.*" -not -name "__init__.py")
          if [ -n "$PYTHON_FILES" ]; then
            echo "$PYTHON_FILES" | xargs autoflake --remove-all-unused-imports --expand-star-imports --ignore-init-module-imports --in-place
            echo "$PYTHON_FILES" | xargs isort --profile black --skip __init__.py --force-alphabetical-sort-within-sections --order-by-type --lines-after-imports=2
            echo "$PYTHON_FILES" | xargs black
          fi

      - name: Determine version bump type
        id: bump
        run: |
          if [[ "${{ github.event.label.name }}" == "release:major" ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.label.name }}" == "release:minor" ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        run: bump-my-version bump --no-commit --no-tag ${{ steps.bump.outputs.type }}
        env:
          BMV_ALLOW_DIRTY: "true"

      - name: Extract version
        id: version
        run: |
          VERSION=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])")
          echo "Extracted version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push changes to PR branch
        run: |
          git add pyproject.toml mtpy/__init__.py README.md docs/source/conf.py
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.head_ref }}

      - name: Add comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Version bumped to **v${{ steps.version.outputs.version }}**. Ready to merge!'
            })
